name: deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-main:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy MAIN via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Deploying MAIN environment..."

            cd /var/www/app/main

            git pull origin main

            docker compose --profile main up -d --build --force-recreate --remove-orphans

            echo "MAIN deployment completed"