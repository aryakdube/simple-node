name: deploy-main

on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Deploy MAIN via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            APP_DIR="/var/www/app/main"
            REPO_URL="https://github.com/YOUR_USERNAME/YOUR_REPO.git"

            echo "🚀 Deploying MAIN environment..."

            if [ ! -d "$APP_DIR" ]; then
              mkdir -p $APP_DIR
              cd $APP_DIR
              git clone $REPO_URL .
            else
              cd $APP_DIR
              if [ ! -d ".git" ]; then
                rm -rf *
                git clone $REPO_URL .
              else
                git pull origin main
              fi
            fi

            docker compose --profile main up -d --build --force-recreate --remove-orphans

            echo "✅ MAIN deployment completed"