name: deploy-prod

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy PROD via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            APP_DIR="$HOME/app/prod"
            REPO_URL="https://github.com/aryakdube/simple-node.git"

            echo "🚀 Starting deployment..."

            # -------------------------------
            # ✅ Install Git if missing
            # -------------------------------
            if ! command -v git &> /dev/null; then
              echo "📦 Installing Git..."
              sudo apt update
              sudo apt install -y git
            else
              echo "✅ Git already installed"
            fi

            # -------------------------------
            # ✅ Install Docker if missing
            # -------------------------------
            if ! command -v docker &> /dev/null; then
              echo "🐳 Installing Docker..."
              sudo apt update
              sudo apt install -y ca-certificates curl gnupg lsb-release

              sudo mkdir -p /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg

              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
                $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

              sudo apt update
              sudo apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

              echo "🔧 Adding user to docker group..."
              sudo usermod -aG docker $USER
            else
              echo "✅ Docker already installed"
            fi

            # -------------------------------
            # ✅ Ensure Docker is running
            # -------------------------------
            if ! sudo systemctl is-active --quiet docker; then
              echo "🚀 Starting Docker..."
              sudo systemctl start docker
            fi

            # -------------------------------
            # ✅ Deployment Logic
            # -------------------------------
            echo "🚀 Deploying PROD environment..."

            if [ ! -d "$APP_DIR" ]; then
              echo "📁 First deployment..."
              mkdir -p $APP_DIR
              cd $APP_DIR
              git clone $REPO_URL .
            else
              echo "📂 Updating existing deployment..."
              cd $APP_DIR

              if [ ! -d ".git" ]; then
                echo "⚠️ Not a git repo. Re-cloning..."
                rm -rf *
                git clone $REPO_URL .
              else
                echo "🔄 Fetching latest code..."
                git fetch origin
                git reset --hard origin/main
              fi
            fi

            # -------------------------------
            # ✅ Ensure .env.prod exists
            # -------------------------------
            if [ ! -f "$APP_DIR/.env.prod" ]; then
              echo "📝 Creating default .env.prod..."

              cat <<EOF > $APP_DIR/.env.prod
            NODE_ENV=production
            PORT=3000
            EOF
            else
              echo "✅ .env.prod already exists"
            fi

            # -------------------------------
            # ✅ Run containers
            # -------------------------------
            echo "🐳 Building & restarting containers..."
            sudo docker compose --profile prod up -d --build --force-recreate --remove-orphans

            echo "✅ PROD deployment completed successfully"