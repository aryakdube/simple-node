version: "3.9"

services:
  main:
    build:
      context: .
    container_name: app_main
    ports:
      - "3000:3000"
    env_file:
      - .env.main
    profiles: ["main"]

  prod:
    build:
      context: .
    container_name: app_prod
    ports:
      - "4000:3000"
    env_file:
      - .env.prod
    profiles: ["prod"]
