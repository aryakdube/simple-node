version: "3.9"

services:
  main:
    build:
      context: .
      target: main
    container_name: app_main
    ports:
      - "${MAIN_HOST_PORT:-3000}:3000"
    env_file:
      - .env.main
    profiles: ["main"]

  prod:
    build:
      context: .
      target: prod
    container_name: app_prod
    ports:
      - "4000:4000"
    env_file:
      - .env.prod
    profiles: ["prod"]
